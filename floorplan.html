<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Facility Floor Plan</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    body {
      margin:0;
      padding:0;
      background-color: black;
      font-family: 'Press Start 2P', monospace;
      overflow: hidden;
      color: white;
      position: relative;
    }

    /* Floor plan image */
    #floorplan {
      width: 100%;
      height: 100vh;
      object-fit: cover;
      position: relative;
      top:0;
      left:0;
      transition: transform 0.1s; /* for slight glitch jitter */
    }

    /* Floating eyes */
    .bg-eye {
      position: absolute;
      width: 50px;
      opacity: 0.05;
      pointer-events: none;
      transition: all 0.3s;
    }

    /* Clickable hotspot */
    .hotspot {
      position: absolute;
      width: 80px;
      height: 80px;
      cursor: pointer;
      border-radius: 10px;
      /* Slight invisible highlight */
      border: 2px dashed rgba(255,0,0,0.2);
    }

    /* Password popup */
    #passwordPopup {
      position: fixed;
      top:50%;
      left:50%;
      transform: translate(-50%, -50%);
      background: rgba(0,0,0,0.95);
      padding: 20px;
      display: none;
      flex-direction: column;
      align-items: center;
      z-index: 10;
      border: 2px solid red;
    }

    #passwordPopup input {
      padding: 10px;
      font-size: 16px;
      margin-bottom: 10px;
      background: black;
      color: white;
      border: 1px solid red;
    }

    #passwordPopup button {
      padding: 10px;
      background: red;
      color: white;
      border: none;
      cursor: pointer;
    }

    #closePopup {
      position: absolute;
      top: 5px;
      right: 10px;
      cursor: pointer;
      color: red;
      font-weight: bold;
      font-size: 18px;
    }
  </style>
</head>
<body>

  <!-- Floor plan -->
  <img src="floorplan.png" id="floorplan" alt="Floor Plan">

  <!-- Background eyes -->
  <img src="eye.png" class="bg-eye" style="top:10%; left:5%;">
  <img src="eye.png" class="bg-eye" style="top:50%; left:70%;">
  <img src="eye.png" class="bg-eye" style="top:80%; left:30%;">
  <img src="eye.png" class="bg-eye" style="top:30%; left:50%;">

  <!-- Hotspots -->
  <div class="hotspot" style="top:40%; left:50%;" onclick="openPassword()"></div>
  <div class="hotspot" style="top:60%; left:30%;" onclick="openPassword()"></div>

  <!-- Password popup -->
  <div id="passwordPopup">
    <div id="closePopup" onclick="closePassword()">X</div>
    <input type="password" id="passwordInput" placeholder="Enter code">
    <button onclick="checkPassword()">Enter</button>
    <div id="hint" style="margin-top:10px; font-size:12px; color:#888;">Hint: Found in the observation logs</div>
  </div>

  <script>
    const popup = document.getElementById('passwordPopup');
    const input = document.getElementById('passwordInput');
    const floorplan = document.getElementById('floorplan');
    const correctPassword = "VISIONARY"; // Example password

    function openPassword(){
      popup.style.display = 'flex';
    }

    function closePassword(){
      popup.style.display = 'none';
    }

    function checkPassword(){
      if(input.value === correctPassword){
        window.location.href = 'visionary.html'; // leads to glitchy Visionary page
      } else {
        input.value = "Wrong...";
        input.style.background = 'red';
        setTimeout(()=>{input.value=''; input.style.background='black';}, 1000);
      }
    }

    // Slight floorplan jitter
    setInterval(() => {
      const x = Math.random()*4 - 2; // small horizontal jitter
      const y = Math.random()*4 - 2; // small vertical jitter
      floorplan.style.transform = `translate(${x}px, ${y}px)`;
    }, 150);

    // Eyes slight movement
    const eyes = document.querySelectorAll('.bg-eye');
    setInterval(() => {
      eyes.forEach(eye => {
        const top = parseFloat(eye.style.top);
        const left = parseFloat(eye.style.left);
        eye.style.top = `${top + (Math.random()*2-1)}%`;
        eye.style.left = `${left + (Math.random()*2-1)}%`;
      });
    }, 300);

  </script>
</body>
</html>
