<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Case Files</title>

  <!-- Font -->
  <link href="https://fonts.googleapis.com/css2?family=Rubik+Glitch&display=swap" rel="stylesheet">

  <style>
    body {
      background-color: #050505;
      color: #fff;
      font-family: 'Rubik Glitch', cursive;
      text-align: center;
      margin: 0;
      padding: 40px;
      position: relative;
      overflow: hidden;
    }

    h1 {
      font-size: 50px;
      margin-bottom: 50px;
      text-shadow: 0 0 10px red;
    }

    /* Case files */
    .casefile {
      display: inline-block;
      margin: 30px;
      border: 2px solid #333;
      border-radius: 15px;
      overflow: hidden;
      width: 300px;
      height: 400px;
      cursor: pointer;
      transition: 0.3s;
    }

    .casefile:hover {
      border-color: red;
      transform: scale(1.05);
    }

    .casefile img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* Random eyes */
    body::before, body::after, .eye1, .eye2, .eye3 {
      content: "";
      position: absolute;
      width: 50px;
      height: 50px;
      background-image: url('eye.png');
      background-size: cover;
      opacity: 0.2;
      pointer-events: none;
    }

    body::before { top: 10%; left: 5%; }
    body::after { top: 60%; left: 80%; }
    .eye1 { top: 30%; left: 70%; }
    .eye2 { top: 80%; left: 40%; }
    .eye3 { top: 50%; left: 10%; }

    /* Overlay (image zoom + message) */
    #overlay {
      position: fixed;
      top:0; left:0;
      width:100%; height:100%;
      background: rgba(0,0,0,0.95);
      display:none;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      z-index: 999;
      font-size: 22px;
      color: #aaa;
    }

    #overlay img {
      max-width: 90%;
      max-height: 70%;
      margin-bottom: 20px;
      box-shadow: 0 0 20px red;
    }

    /* Secret eye button */
    .secret-eye {
      width: 100px;
      margin-top: 60px;
      cursor: pointer;
      opacity: 0.6;
      transition: 0.3s;
    }

    .secret-eye:hover {
      opacity: 1;
      transform: scale(1.1);
    }

    /* Popup password box */
    #secretBox {
      position: fixed;
      top:0;
      left:0;
      width:100%;
      height:100%;
      background: rgba(0,0,0,0.9);
      display:none;
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }

    .secretContent {
      background: #111;
      padding: 30px;
      border: 2px solid red;
      position: relative;
    }

    .closeBtn {
      position: absolute;
      top: 10px;
      right: 15px;
      cursor: pointer;
      font-size: 20px;
    }

    .secretContent input {
      padding: 10px;
      margin-top: 15px;
      background: black;
      color: white;
      border: 1px solid white;
    }
  </style>
</head>

<body>

  <!-- Background eyes -->
  <div class="eye1"></div>
  <div class="eye2"></div>
  <div class="eye3"></div>

  <h1>Case Files</h1>

  <!-- Case Files -->
  <div class="casefile" onclick="openOverlay('Case_001.png','PUT IN LINK...')">
    <img src="Case_001.png">
  </div>

  <div class="casefile" onclick="openOverlay('Case_002.png','ORDER')">
    <img src="Case_002.png">
  </div>

  <div class="casefile" onclick="openOverlay('Case_003.png','TO ADVANCE')">
    <img src="Case_003.png">
  </div>

  <!-- Clickable secret eye -->
  <img src="eye.png" class="secret-eye" onclick="openSecret()">

  <!-- Overlay (zoom + message) -->
  <div id="overlay" onclick="closeOverlay()">
    <img id="overlay-img">
    <div id="overlay-text"></div>
  </div>

  <!-- Secret password popup -->
  <div id="secretBox">
    <div class="secretContent">
      <span class="closeBtn" onclick="closeSecret()">X</span>
      <h2>...</h2>
      <input type="password" id="secretInput" placeholder="Enter code">
      <button onclick="checkSecret()">Enter</button>
    </div>
  </div>

  <script>
    function openOverlay(src, text) {
      document.getElementById("overlay-img").src = src;
      document.getElementById("overlay-text").textContent = text;
      document.getElementById("overlay").style.display = "flex";
    }

    function closeOverlay() {
      document.getElementById("overlay").style.display = "none";
    }

    function openSecret() {
      document.getElementById("secretBox").style.display = "flex";
    }

    function closeSecret() {
      document.getElementById("secretBox").style.display = "none";
    }

    function checkSecret() {
      const input = document.getElementById("secretInput");

      if (input.value === "001011018") {
        window.location.href = "001011018/";
      } else {
        input.value = "Wrong";
        input.style.color = "red";

        setTimeout(() => {
          input.value = "";
          input.style.color = "white";
        }, 1000);
      }
    }
  </script>

</body>
</html>
