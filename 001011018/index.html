<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Observation Logs</title>

  <!-- Font -->
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

  <style>
    body {
      margin:0;
      padding:0;
      background-color: black;
      font-family: 'Press Start 2P', monospace;
      color: white;
      text-align: center;
    }

    h1 {
      margin-top: 30px;
      font-size: 30px;
      color: red;
      text-shadow: 0 0 10px red;
    }

    /* Log images */
    .log {
      width: 250px;
      margin: 30px;
      cursor: pointer;
      border: 2px solid #222;
      border-radius: 10px;
      transition: 0.2s;
    }

    .log:hover {
      border-color: red;
      transform: scale(1.05);
    }

    /* Background eyes */
    .bg-eye {
      position: absolute;
      width: 60px;
      opacity: 0.1;
      pointer-events: none;
    }

    /* Popup */
    #popup {
      position: fixed;
      top:0;
      left:0;
      width:100%;
      height:100%;
      background: rgba(0,0,0,0.95);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 100;
    }

    #popup img {
      max-width: 90%;
      max-height: 90%;
      animation: glitch 0.2s infinite;
    }

    #closeBtn {
      position: absolute;
      top:20px;
      right:30px;
      color: red;
      font-size: 30px;
      cursor: pointer;
    }

    /* Glitch animation */
    @keyframes glitch {
      0% { transform: translate(0,0); }
      25% { transform: translate(-2px,2px); }
      50% { transform: translate(2px,-2px); }
      75% { transform: translate(-1px,1px); }
      100% { transform: translate(0,0); }
    }

  </style>
</head>
<body>

  <h1>Observation Logs</h1>

  <!-- Logs -->
  <img src="log1.png" class="log" onclick="openPopup(this)">
  <img src="log2.png" class="log" onclick="openPopup(this)">
  <img src="log3.png" class="log" onclick="openPopup(this)">

  <!-- Background eyes -->
  <img src="eye.png" class="bg-eye" style="top:10%; left:5%;">
  <img src="eye.png" class="bg-eye" style="top:40%; left:70%;">
  <img src="eye.png" class="bg-eye" style="top:70%; left:30%;">

  <!-- Popup -->
  <div id="popup" onclick="closePopup(event)">
    <span id="closeBtn" onclick="closePopup(event)">X</span>
    <img id="popupImg">
  </div>

  <script>
    const popup = document.getElementById("popup");
    const popupImg = document.getElementById("popupImg");

    function openPopup(img){
      popup.style.display = "flex";
      popupImg.src = img.src;
    }

    function closePopup(event){
      if(event.target.id === "popup" || event.target.id === "closeBtn"){
        popup.style.display = "none";
      }
    }

    // slight eye movement
    const eyes = document.querySelectorAll('.bg-eye');
    setInterval(() => {
      eyes.forEach(eye => {
        const top = parseFloat(eye.style.top);
        const left = parseFloat(eye.style.left);
        eye.style.top = (top + (Math.random()*2-1)) + "%";
        eye.style.left = (left + (Math.random()*2-1)) + "%";
      });
    }, 300);

  </script>

</body>
</html>
