<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Welcome</title>
  <style>
    body {
      background-color: #050505;
      color: #ffffff;
      font-family: monospace;
      text-align: center;
      margin: 0;
      padding: 0;
    }

    .container {
      margin-top: 10%;
    }

    img {
      width: 250px;
      margin-bottom: 40px;
      filter: drop-shadow(0 0 15px red);
    }

    input {
      padding: 15px;
      font-size: 20px;
      width: 300px;
      border: 2px solid white;
      background-color: black;
      color: white;
      outline: none;
      text-align: center;
      transition: 0.3s;
    }

    input.error {
      border-color: red;
      color: red;
    }

    button {
      margin-top: 20px;
      padding: 12px 30px;
      font-size: 18px;
      border: none;
      background-color: red;
      color: white;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background-color: darkred;
    }

    .hint {
      margin-top: 25px;
      color: #666;
      font-size: 14px;
    }
  </style>
</head>
<body>

  <div class="container">

    <!-- Eye Image -->
    <img src="eye.png" alt="Eye">

    <!-- Password Box -->
    <div>
      <input type="password" id="passwordInput" placeholder="Enter password">
    </div>

    <button onclick="checkPassword()">Enter</button>

    <div class="hint">
      The answer is already out there.
    </div>

  </div>

  <script>
    const correctPassword = "Always watching";

    function checkPassword() {
      const input = document.getElementById("passwordInput");
      const value = input.value;

      if (value === correctPassword) {
        window.location.href = "casefiles.html";
      } else {
        input.value = "Incorrect password";
        input.classList.add("error");

        setTimeout(() => {
          input.value = "";
          input.classList.remove("error");
        }, 1500);
      }
    }
  </script>

</body>
</html>
